version: "3.9"

services:

  web:
    build: .
    container_name: FINREPportal
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8002 --workers 3 --timeout 300"
    env_file:
      - .env
    restart: always
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    ports:
      - "8002:8002"